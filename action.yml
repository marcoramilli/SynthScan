name: "SynthScan"
description: "Detect AI-generated / synthetic code patterns and open a GitHub Issue with the findings."
author: "Marco Ramilli"

branding:
  icon: "search"
  color: "orange"

inputs:
  scan_path:
    description: "Path to the directory to scan (relative to repo root)."
    required: false
    default: "."
  patterns_file:
    description: "Path to the Markdown file containing detection patterns."
    required: false
    default: "patterns/synthetic_patterns.md"
  score_threshold:
    description: "Fail the action when the score meets or exceeds this value. Set to 0 to never fail."
    required: false
    default: "0"
  create_issue:
    description: "Whether to create a GitHub Issue with the results (true/false)."
    required: false
    default: "true"
  issue_label:
    description: "Label to attach to the created issue."
    required: false
    default: "synthscan"
  report_path:
    description: "File path for the JSON report."
    required: false
    default: "synthscan-report.json"

outputs:
  score:
    description: "The total synthetic-code score."
  match_count:
    description: "Number of pattern matches found."
  issue_body:
    description: "Full Markdown body of the report (also used in the issue)."

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Run SynthScan
      id: scan
      shell: bash
      env:
        INPUT_SCAN_PATH: ${{ inputs.scan_path }}
        INPUT_PATTERNS_FILE: ${{ inputs.patterns_file }}
        INPUT_SCORE_THRESHOLD: ${{ inputs.score_threshold }}
        INPUT_REPORT_PATH: ${{ inputs.report_path }}
      run: |
        python "${{ github.action_path }}/scanner/synthscan.py"

    - name: Create GitHub Issue
      if: inputs.create_issue == 'true' && steps.scan.outputs.match_count != '0'
      uses: actions/github-script@v7
      with:
        script: |
          const score = `${{ steps.scan.outputs.score }}`;
          const body  = `${{ steps.scan.outputs.issue_body }}`.replace(/\\n/g, '\n');

          // Check for existing open issue to avoid duplicates
          const existing = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            labels: '${{ inputs.issue_label }}',
            state: 'open',
          });

          if (existing.data.length > 0) {
            // Update the most recent open issue
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.data[0].number,
              body: body,
            });
            core.info(`Updated existing issue #${existing.data[0].number}`);
          } else {
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `SynthScan Report – Synthetic Score: ${score}`,
              body: body,
              labels: ['${{ inputs.issue_label }}'],
            });
            core.info('Created new SynthScan issue');
          }

    - name: Upload JSON report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: synthscan-report
        path: ${{ inputs.report_path }}
